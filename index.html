<style>
@font-face {
	font-family: "Plex Sans";
	src:
		local("IBM Plex Sans Var"),
		url('_res/IBM Plex Sans Var-Roman.woff2') format("woff2")
}

/* @font-face {
	font-family: "Plex Mono";
	src:
		local("IBM Plex Mono")
} */

* {
	/* --clr-a: color-mix(in srgb, red, deeppink); */
	/* --clr-a: oklch(from greenyellow l calc(c * 5) calc(h + 243)); */
	/* --clr-a: color-mix(in lab, var(--clr-bl) 50%, hsl(from greenyellow calc(h + 255) calc(s * 4) calc(l * 1.125)) ); */
	--clr-a: #FF0038; /* result from above */ 
	/* --clr-a: hsl(from greenyellow calc(h + 255) calc(s * 4) calc(l * 1.125)); */
}
html {

	--clr-a2: hsl(from var(--clr-a) calc(h + 160) s l );
	--clr-3: #f5ff3b; 
	--clr-a2: greenyellow;
	--clr-blue: oklch(50% 0.3 284);
	--clr-prpl: color-mix(in lab, var(--clr-blue), var(--clr-a));
	--clr-wh: ghostwhite;
	--clr-bl: #2b2b2b; 

	--profile-size: 3lh;
	--xx-shdw: .5ch .5ch 0;
	--x-shdw: .35ch .35ch 0;
	color: var(--clr-bl);
	/* font-family: 'IBM Plex Serif', serif; */
}

	::selection {
				color: var(--clr-bl);
		background-color: var(--clr-a2);
	}

body {

    background:

    linear-gradient(
		to right,
        var(--g_color) var(--g_thickness),transparent var(--g_thickness)
    ) var(--g-decl),
    linear-gradient(
		to top,
        var(--g_color) var(--g_thickness), transparent var(--g_thickness)
    ) var(--g-decl),
    linear-gradient(
      to left,
      var(--g_color) var(--g_thickness), transparent var(--g_thickness)
    ) var(--g-decl),
    linear-gradient(
		to bottom,
      	var(--g_color) var(--g_thickness), var(--g_bg_color) var(--g_thickness)
	 ) var(--g-decl)
	
	 ,
	
	 linear-gradient(
		to right,
		var(--g2_color) var(--g2_thickness),transparent var(--g2_thickness)
	 ) var(--g2-decl),
    linear-gradient(
		to top,
        var(--g2_color) var(--g2_thickness), transparent var(--g2_thickness)
    ) var(--g2-decl),
    linear-gradient(
      to left,
      var(--g2_color) var(--g2_thickness), transparent var(--g2_thickness)
    ) var(--g2-decl),
    linear-gradient(
		to bottom,
      	var(--g2_color) var(--g2_thickness), var(--g2_bg_color) var(--g2_thickness)
	 ) var(--g2-decl)
		 ;
	--g_bg_color: transparent;
	--g_color: #ddd;
	
	/* --g_thickness: .0625ch;
	--g_thickness: .0625ch;
	--g_thickness: .25ch; */
	--g_thickness: 1px;
	--bg_size: 5vmin;
	--bg_pos: calc(var(--bg_size) * .5);
	/* --bg_pos: 50%; */
	--g-decl: var(--bg_pos) var(--bg_pos) / var(--bg_size) var(--bg_size) repeat repeat;
	
	--g2_color: #eee;
	--g2_bg_color: var(--clr-wh);
	--g2_thickness: 1px;
	--g2_bg_size: calc(var(--bg_size) / 3);
	--g2_bg_pos: calc(var(--g2_bg_size) / 2);
	/* --g2_bg_pos: 50%; */
	/* --g2_bg_pos: ; */
	--g2-decl:
		calc( var(--g2_bg_pos)
			/* + (var(--g2_thickness) / 3) */
		)
		calc( var(--g2_bg_pos) 
			+ (var(--g2_thickness) / 3)
		)
		/
		var(--g2_bg_size) var(--g2_bg_size) repeat repeat; 
	/* background-position: var(--bg_pos) var(--bg_pos); */
  /* background-repeat: round repeat; */
  /* background-size: var(--bg_size) var(--bg_size); */
 
  }


body {
	font-family: 'Plex Sans', sans-serif;
	font-stretch: 85%;
	font-feature-settings:
	'ss01',
	'ss02'
	/* 'ss05' */
	
/*
	+------+---------+
	| OT   | Affects |
	+------+---------+
	| ss01 | a → ɑ	 |
	| ss02 | g → ɡ   |
	| ss03 | 0 + /   |
	| ss05 | ß → ſʒ  |
	+------+---------+
*/
	;
	/* font-family: 'IBM Plex Mono'; */

	display: grid;
	--gutter: 10vmin;
	grid-template-columns: var(--gutter) [header-start main-start] 1fr [header-end main-end] var(--gutter);
	grid-template-rows: [header-start] auto [header-end main-start] 1fr [main-end];
	main {grid-area: main}
	header {grid-area:header} 
	main,header {
		width: clamp(625px, 625px, 75vw);
	}
	min-height: 95vh;
	justify-items: center;
	margin:0;
	padding:0;
}

main {
	grid-column: 2;
	margin:0;
	padding:0;
}


@keyframes wiggle {
	0%,50%,100% {background-position-x: 0%;}
	25% { background-position-x: 5%}
	75% { background-position-x: -5%}
}

.title {
	padding: 0.125lh .5ch;
	/* isolation: isolate; */
	font-size: xx-large;
	/* background-color: var(--clr-a); */
	/* color: var(--clr-wh); */
	z-index: 105;
	min-height: 1.5lh;
	color: var(--clr-wh);
	font-weight: 625;
	/* text-shadow: .125ch .125ch 0 lime; */
	position:relative; &::after, &::before {content: "";position: absolute;
		transition: background 1500ms}
	&::before {
		z-index: -100;
		inset: 0;
		background-color: var(--clr-bl);
		
	}
	&::after {
		z-index: -99;
		inset: 40% -5% -25% 15%; /* TRdl */
		inset: 40% -5% -25% 47%; /* TRdl */
		inset: 40% -5% -25% 30%; /* TRdl */
		inset: 0 25%;
		translate: 55% 35%;
		background: url('_res/lain.jpg');
		background-size: 100%;
		background-position-y: 60%;
		/* rotate: 4deg; */
		background-blend-mode: multiply;
		background-repeat: no-repeat;
		
		/* background-color: #ff0000;
		*/
		
		background-color: var(--clr-a);
		background-color: var(--clr-a2);
					/* transition-delay: 500ms; */
	}
	&::before {
		/* background-image: url('_res/lain.jpg'); */
		background-blend-mode: multiply;
		background-repeat: no-repeat;
		background-blend-mode: darken;
		background-position-y: 56%;
		background-position-y:  15%;
	}
}

:is(:has(:any-link:hover),:has(.id:hover)) .title,
.title:hover {
		/* &::before {
			background-position-y: 42%;
			background-position-y: 38%;
		} */
		&::after {
			background-size: 105%;
			background-position-y: 41%;
			transition-delay: 500ms;
			transition: background 1500ms;
		}
}

.title {
	:has(#social-media .id:hover) &::after {background-color: var(--clr-prpl);}
	:has(#music:hover) &::after {background-color: var(--clr-a);}
	:has(#general:hover) &::after {background-color: var(--clr-blue);}
}

legend {
	font-weight: 600;
}

fieldset {
	border: .3ch solid var(--clr-bl);
}

.id {
	user-select: all;
	cursor: copy;
	font-stretch: 85%;

	&::selection {
		background-color: var(--clr-blue);
		color: var(--clr-wh)
	}
}

h2 {
	/* background-color: var(--clr-wh); */
	/* border: .25ch solid #ddd; */
	/* display: inline-block; */
	/* box-shadow: .25ch .25ch 0 red; */
}

#general,#music {
	box-shadow: var(--x-shdw) var(--_clr);
	:any-link {text-decoration-color: var(--_clr);}
	:any-link, .id {transition: color 150ms;
	&:hover {color: var(--_clr)}}
	.id::selection {background-color: var(--_clr);}
	legend {color: var(--_clr) };
}
#general, #music {
	width: 100%;
	background-color: var(--clr-wh);
}

#social-media, #tbd {
	box-shadow: var(--x-shdw) var(--clr-bl);
	width: 100%;
	background-color: #eee;
	display: grid;
	grid-template-columns: 1fr 1fr;
	grid-template-rows: 1fr;
	gap: 1ch;
	.id {
		transition: color 150ms;
		&::selection{
			background-color: var(--clr-prpl);
		}
		&:hover {
			color: var(--clr-prpl);
		}
	}
}

ul,li {
	padding: 0;
	margin: 0 1.5ch 0;
}

#general {
	--_clr: var(--clr-blue);
}
#music {
	--_clr: var(--clr-a)
}
/* fieldset ~ fieldset, */
article ~ article {
	margin-top: .5lh;
}


.grid {
	display: grid;
	grid-template-columns:  
	[links-start const-start] 1fr [links-end const-end]
	5ch
	[video-start] 1fr [video-end]
	;
	
	grid-template-rows: 
	[links-start video-start] 1fr [links-end const-start]
	1fr [video-end const-end];
}

@media (width < 625px) {
	body {
		main,header {width:100%}
	}
	.grid {
		grid-template-columns:
		[links-start video-start const-start] auto [links-end video-end const-end];
		grid-template-rows:
			[links-start] auto [links-end video-start] auto [video-end const-start] 12lh [const-end]
	}
	video {
			justify-self: center;
			width: 100%;
			object-fit: cover;
			/* height: 100% */
	}
}

article:first-of-type {
	grid-area: links;}
	article:nth-of-type(2) {
		grid-area: const;
	}

video {
	background-color: var(--clr-bl);
	/* grid-column: 3;
	grid-row: span 2; */
	grid-area: video;
	/* object-fit: cover; */
	/* margin-top: .83em; */
	margin-top: .5em;
	margin-left: 5px; /*🌌*/
	height: max-content;
	/* ^ only needed if h2 is present 
	max-height: 500px;*/
	box-shadow: var(--xx-shdw) var(--clr-a2);
	border: .35ch solid var(--clr-bl);
}

#tbd {
	/* box-shadow: var(--xx-shdw) var(--clr-3); */
	--_bg-w: 1em;
	--_bg-w-2: calc( var(--_bg-w) * .5);
	background:
	repeating-linear-gradient(
		to bottom right,
		var(--clr-bl) 0 var(--_bg-w-2),
		var(--clr-3) var(--_bg-w-2) var(--_bg-w)
	) border-box ;
	display: grid;
	place-items: center;
	container-type: size;
	height: 50%;

}


article:nth-child(2) {
	height: 84.5%;
}
.marquee {
	background-color: #eee;
border: .5ch solid var(--clr-bl);
margin-inline: auto;
width: 200%;
}
svg {

	width: 100%;
	height: 90cqh;
}

header {
	margin-bottom: 1.5lh;
	img {
		max-height: var(--profile-size);
		z-index: 150;
		margin-left: auto;

		border-radius: 100vmax;
		border: 0ch solid var(--clr-wh);

	}
}
</style>
