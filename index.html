body {
	font-family: 'Plex Sans', sans-serif;
	font-stretch: 85%;
	font-feature-settings:
	'ss01',
	'ss02'
	/* 'ss05' */
	
/*
	+------+---------+
	| OT   | Affects |
	+------+---------+
	| ss01 | a → ɑ	 |
	| ss02 | g → ɡ   |
	| ss03 | 0 + /   |
	| ss05 | ß → ſʒ  |
	+------+---------+
*/
	;
	/* font-family: 'IBM Plex Mono'; */

	display: grid;
	--gutter: 10vmin;
	grid-template-columns: var(--gutter) [header-start main-start] 1fr [header-end main-end] var(--gutter);
	grid-template-rows: [header-start] auto [header-end main-start] 1fr [main-end];
	main {grid-area: main}
	header {grid-area:header} 
	main,header {
		width: clamp(600px, 600px, 75vw);
	}
	min-height: 95vh;
	justify-items: center;
	margin:0;
	padding:0;
}

main {
	grid-column: 2;
	margin:0;
	padding:0;
}

.title {
	padding: 0.125lh .5ch;
	isolation: isolate;
	font-size: xx-large;
	/* background-color: var(--clr-a); */
	/* color: var(--clr-wh); */
	z-index: 105;
	color: var(--clr-wh);
	font-weight: 625;
	/* text-shadow: .125ch .125ch 0 lime; */
	position:relative; &::after, &::before {content: "";position: absolute}
	&::before {
		z-index: -100;
		inset: 0;
		background-color: var(--clr-bl);
		
	}
	&::after {
		z-index: -99;
		inset: 40% -5% -25% 15%; /* TRdl */
		inset: 40% -5% -25% 47%; /* TRdl */


		/* background-color: #ff0000;
		 */
		background-color: var(--clr-a);
	}

}

legend {
	font-weight: 600;
}

fieldset {
	border: .3ch solid var(--clr-bl);
}

.id {
	user-select: all;
	cursor: copy;
	font-stretch: 85%;

	&::selection {
		background-color: var(--clr-blue);
		color: var(--clr-wh)
	}
}
